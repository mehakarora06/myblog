<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .card {
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 animate__animated animate__fadeInDown">
    <span class="navbar-brand">My Blog</span>

    <div>
        <a href="/create/" class="btn btn-success">+ New Post</a>
        <a href="/logout/" class="btn btn-danger">Logout</a>
    </div>
</nav>

<!-- 🧾 POSTS -->
<div class="container mt-4 animate__animated animate__fadeIn">

    <div class="row">
        {% for post in posts %}
            <div class="col-md-4">
                <div class="card mb-4 shadow animate__animated animate__fadeInUp">

                    <div class="card-body">
                        <h5 class="card-title">{{ post.title }}</h5>

                        <p class="card-text">
                            {{ post.content|truncatewords:20 }}
                        </p>

                        <p class="text-muted">
                            By <strong>{{ post.author.username }}</strong>
                        </p>

                        <a href="/edit/{{ post.id }}/" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete/{{ post.id }}/" class="btn btn-danger btn-sm">Delete</a>
                    </div>

                </div>
            </div>
        {% empty %}
            <h3 class="text-white">No posts yet 😢</h3>
        {% endfor %}
    </div>

</div>

</body>
</html>
